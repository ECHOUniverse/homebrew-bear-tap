name: Update Cask

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New version tag (e.g., v1.5.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifact (with retries)
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          URL="https://github.com/ECHOUniverse/BearTodoMenuBar/releases/download/v${VERSION}/BearTodoMenuBar.zip"
          echo "Downloading from: $URL"
          for i in 1 2 3 4 5; do
            if curl -f -L -o BearTodoMenuBar.zip "$URL"; then
              echo "Downloaded successfully on attempt $i"
              break
            fi
            echo "Attempt $i failed, waiting 10 seconds..."
            sleep 10
          done
          if [ ! -f BearTodoMenuBar.zip ]; then
            echo "Failed to download after 5 attempts"
            exit 1
          fi

      - name: Compute SHA256
        id: sha
        run: |
          SHA=$(shasum -a 256 BearTodoMenuBar.zip | cut -d ' ' -f 1)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "Computed SHA256: $SHA"

      - name: Update cask file
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          SHA256="${{ steps.sha.outputs.sha256 }}"

          sed -i '' \
            -e 's/version ".*"/version "'"$VERSION"'"/' \
            -e 's/sha256 ".*"/sha256 "'"$SHA256"'"/' \
            Casks/bear-todo-menu-bar.rb

          echo "Updated Casks/bear-todo-menu-bar.rb:"
          cat Casks/bear-todo-menu-bar.rb

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/bear-todo-menu-bar.rb
          git commit -m "Update bear-todo-menu-bar to v${{ inputs.version }}"
          git push
